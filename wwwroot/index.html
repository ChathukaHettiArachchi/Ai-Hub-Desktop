<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Hub</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="/styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>
</head>

<body class="bg-[#FFFFFF]">

    <div class="flex h-screen">

        <nav class="w-16 bg-black flex flex-col items-center py-4 justify-center gap-4">

            <button id="privateChatBtn"
                class="w-16 h-24 flex flex-col items-center justify-center border-b border-t border-slate-700 "
                title="Private Chat">
                <img src="/images/privatechat.png" alt="Chat" class="w-6 h-5">
                <span class="text-[10px] text-white mt-1">Private <br> Chat</span>
            </button>

            <button id="myLinksBtn"
                class="w-16 h-20   flex flex-col items-center justify-center border-b border-slate-700"
                title="My Links">
                <img src="/images/mylinks.png" alt="Links" class="w-6 h-6 mb-1">
                <span class="text-[10px] text-white mb-4">My Links</span>
            </button>

            <button id="workpadBtn"
                class="w-16 h-20   flex flex-col items-center justify-center border-b border-slate-700" title="Workpad">
                <img src="/images/workpad.png" alt="Workpad" class="w-6 h-6 mb-1">
                <span class="text-[10px] text-white mb-4">Workpad</span>
            </button>

        </nav>

        <!-- RIGHT SIDE: header on top, sidebar + main below -->
        <div class="flex flex-col flex-1 min-w-0 overflow-hidden">

            <!-- TOP HEADER -->
            <header class="relative bg-white px-8 pt-5 pb-8">

                <div class="flex items-start justify-between">

                    <!-- Title / Subtitle -->
                    <div>
                        <p id="companyName" class="text-3xl font-medium text-slate-900">
                            Chancellor &amp; Gallaha Law Company
                        </p>
                        <p id="sessionTimestamp" class="mt-1 text-sm text-slate-600">

                        </p>
                    </div>

                    <!-- Center pill -->
                    <div class="absolute left-1/2 -translate-x-1/2 top-6">
                        <button id="aiHubBtn"
                            class="px-8 py-4 rounded-lg border border-slate-100 bg-white shadow-lg text-slate-900 font-medium">
                            AI Hub
                        </button>
                    </div>

                    <!-- Right: version / user / logout -->
                    <div class="flex flex-col items-start">

                        <span id="appVersion" class="text-xs text-slate-600 mb-2 ">
                            Anzee Private AI V01.004
                        </span>

                        <div class="flex items-center gap-4">
                            <span id="userName" class="text-sm text-slate-700">
                                ChathukaH
                            </span>

                            <div id="userAvatar"
                                class="w-7 h-7 rounded-full bg-green-600 text-white text-xs font-semibold flex items-center justify-center">
                                CH
                            </div>

                            <button id="logoutBtn" class="text-red-500 hover:text-red-600" title="Log out"
                                aria-label="Log out">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                                    <line x1="12" y1="2" x2="12" y2="12"></line>
                                </svg>
                            </button>
                        </div>

                    </div>

                </div>

                <!-- divider -->
                <div class="absolute bottom-0 left-[10px] right-[10px] w-[full] border-b border-slate-300"></div>

            </header>

            <!-- SIDEBAR + MAIN ROW -->
            <div class="flex flex-1 min-h-0 mt-2.5 mb-4 bg-[#FFFFFF] px-6">

                <!-- SIDEBAR -->
                <aside class=" ml-2 bg-[#FAFAFA] border border-slate-200 rounded-xl flex flex-col">

                    <div class="p-4  border-b border-slate-200">

                        <button id="newSessionBtn"
                            class="w-full bg-[#273E8C] hover:bg-blue-800 text-white rounded-lg py-2 text-sm">
                            <span class="mr-2">+</span>New Session
                        </button>

                        <button id="clearChatsBtn"
                            class="mt-2 w-full bg-red-600 hover:bg-red-700 text-white rounded-lg py-2 text-sm hidden">
                            Clear All Chats
                        </button>


                        <div class="mt-2 flex items-center">

                            <input id="searchInput" type="text" placeholder="Search Sessions..."
                                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">

                            <button id="filterBtn" class="w-10 h-10 flex items-center justify-end "
                                title="Filter Sessions">

                                <img src="/images/Sort.png" alt="Filter" class="w-4 h-4">

                            </button>

                        </div>

                        <button id="settingsToggle"
                            class="mt-3 w-full bg-slate-700 hover:bg-slate-800 text-white rounded-lg py-2 text-sm hidden">
                            ⚙ Engine Settings
                        </button>

                    </div>

                    <div id="sessionList" class="flex-1 overflow-y-auto px-4 pb-3 mt-4 bg-[#FAFAFA] text-sm">
                    </div>

                </aside>

                <div id="sidebarExpander">
                    <img src="images/expander.png" alt="Expand">
                </div>

                <!-- MAIN -->
                <main id="chatMain"
                    class="relative flex-1 flex flex-col ml-2 mr-2.5 border border-slate-300 rounded-xl bg-[#ffffff]">

                    <!-- HEADER -->
                    <!-- <div id="chatTitle" class="bg-[#FAFAFA] rounded-t-xl px-6 py-5 text-sm font-semibold ">

                    </div> -->

                    <!-- SETTINGS PANEL -->
                    <div id="settingsPanel" class="hidden bg-white border-b border-slate-200 p-5">

                        <div class="grid grid-cols-2 gap-4">

                            <div>
                                <label class="block mb-1 font-medium">
                                    llama.cpp server
                                </label>

                                <input id="enginePath" type="text" class="w-full border rounded-lg p-2"
                                    placeholder="C:\llama.cpp\llama-server.exe">
                            </div>

                            <div>
                                <label class="block mb-1 font-medium">
                                    Model Path
                                </label>

                                <input id="modelPath" type="text" class="w-full border rounded-lg p-2">
                            </div>

                            <div>
                                <label class="block mb-1 font-medium">
                                    Port
                                </label>

                                <input id="port" type="number" class="w-full border rounded-lg p-2">
                            </div>

                            <div>
                                <label class="block mb-1 font-medium">
                                    Context Size
                                </label>

                                <input id="contextSize" type="number" class="w-full border rounded-lg p-2">
                            </div>

                            <div>
                                <label class="block mb-1 font-medium">
                                    GPU Layers
                                </label>

                                <input id="gpuLayers" type="number" class="w-full border rounded-lg p-2">
                            </div>

                            <div>
                                <label class="block mb-1 font-medium">
                                    GGUF Models
                                </label>

                                <div class="flex gap-2">

                                    <select id="model" class="flex-1 border rounded-lg p-2">
                                    </select>

                                    <button id="refreshModels" class="px-4 bg-slate-200 rounded-lg">
                                        ↻
                                    </button>

                                </div>
                            </div>

                        </div>

                        <div class="flex gap-3 mt-4">

                            <button id="saveEngine" class="px-4 py-2 bg-slate-700 text-white rounded-lg">
                                Save
                            </button>

                            <button id="startEngine" class="px-4 py-2 bg-green-600 text-white rounded-lg">
                                Start
                            </button>

                            <button id="stopEngine" class="px-4 py-2 bg-red-600 text-white rounded-lg">
                                Stop
                            </button>

                        </div>

                        <div class="mt-4">

                            <div class="font-medium mb-2">
                                Download GGUF Model
                            </div>

                            <input id="modelUrl" type="url" placeholder="https://..."
                                class="w-full border rounded-lg p-2 mb-2">

                            <input id="modelFileName" type="text" placeholder="model.gguf"
                                class="w-full border rounded-lg p-2 mb-2">

                            <button id="downloadModel" class="px-4 py-2 bg-blue-900 text-white rounded-lg">
                                Download
                            </button>

                        </div>

                        <div class="mt-4">

                            <label class="block mb-2 font-medium">
                                System Prompt
                            </label>

                            <textarea id="systemPrompt" rows="4" class="w-full border rounded-lg p-3">
                        You are a helpful assistant.

Avoid repeating information.

Do not restate the same facts using different wording.

Keep answers concise and information-dense.

If a point has already been made, do not repeat it.
                        
                        
                        </textarea>

                        </div>

                        <div class="mt-4 text-sm text-slate-600">

                            <div id="engineStatus">
                                Engine stopped
                            </div>

                            <div id="downloadStatus">
                                Downloads are optional
                            </div>

                        </div>

                    </div>

                    <!-- CHAT -->
                    <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6">
                        <div id="emptyState" class="text-center text-slate-500 mt-10">

                        </div>
                    </div>

                    <div id="chatComposer">

                        <div id="composerExpander">
                             <img src="images/expander.png" alt="Expand">
                        </div>

                        <div class="bg-[#FAFAFA]  border-t border-slate-300 px-4 ">

                            <div class="flex items-center gap-4">

                                <span class="text-xs text-slate-600 whitespace-nowrap pt-8 ml-3.5">
                                    Select 1 or 2 AI Engines
                                </span>

                                <span class="text-slate-500 pt-8">
                                    →
                                </span>

                                <!-- MODEL CHIPS -->
                                <div id="modelSection" class="bg-[#FAFAFA] px-4 py-2">

                                    <!-- Private -->
                                    <div class="text-center text-[10px] text-slate-900 mb-2">
                                        Private
                                    </div>

                                    <!-- Divider -->
                                    <div class="border-b border-slate-400 mb-3"></div>

                                    <!-- Model Chips Row -->
                                    <div class="flex items-center gap-2">

                                        <div id="modelList" class="flex gap-16 flex-wrap">
                                        </div>

                                    </div>

                                </div>

                            </div>

                        </div>

                        <div class="bg-[#FAFAFA] pb-6 px-6 rounded-b-xl">

                            <div class="relative">

                                <div id="summernote-wrapper">
                                    <textarea id="prompt"></textarea>
                                </div>

                                <button id="send"
                                    class="absolute -bottom-3.5 -right-3.5 h-9 w-9 rounded-full bg-black text-white hover:bg-slate-800 flex items-center justify-center z-10">
                                    <img src="/images/send.png" alt="Send" class="w-4 h-4">
                                </button>

                            </div>

                        </div>
                    </div>

                </main>

            </div>

        </div>

    </div>

    <template id="messageTemplate">
        <article class="message">
            <div class="message-role"></div>
            <div class="message-content"></div>
        </article>
    </template>


    <div id="desktopPopup" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">

        <div class="bg-white rounded-xl p-6 w-[350px] shadow-xl text-center">

            <h3 id="popupTitle" class="text-lg font-semibold mb-3">
                Feature Unavailable
            </h3>

            <p id="popupMessage" class="text-slate-600 mb-5">
            </p>

            <button id="closeDesktopPopup" class="px-5 py-2 bg-blue-900 text-white rounded-lg hover:bg-blue-800">
                OK
            </button>

        </div>

    </div>


    <div id="halfExpandBackdrop" class="hidden fixed inset-0 bg-black/40 z-[9998]">
    </div>

    <div id="responseModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center ">

        <div class="bg-white rounded-xl flex flex-col w-[93%] h-[93%] ml-16">

            <div id="responseModalHeader" class="flex justify-between items-center p-4  rounded-t-xl">

                <h3 id="responseModalTitle" class="font-semibold text-white">
                </h3>

                <button id="closeResponseModal" class="text-white text-xl mr-1">
                    ✕
                </button>

            </div>

            <div id="responseModalContent" class="flex-1 overflow-y-auto p-6">
            </div>

            <div id="responseModalContent" class="flex-1 overflow-y-auto p-6 whitespace-pre-wrap">
            </div>

        </div>

    </div>

    <div id="comparisonExpandModal" class="hidden fixed inset-0 bg-black/50 z-[9999] flex items-center justify-center">

        <div class="bg-white w-[95vw] h-[96vh] ml-16 rounded-xl flex flex-col">

            <div class="flex justify-between items-center ">
                <h3 class="font-semibold">

                </h3>

                <button id="closeComparisonExpand" class="mt-2 mr-4 text-xl">
                    ✕
                </button>
            </div>

            <div id="comparisonExpandContent" class="grid grid-cols-2 gap-4 p-4 flex-1 overflow-hidden">
            </div>

        </div>

    </div>


    </div>

    <script src="/chat-new.js"></script>

</body>

</html>
